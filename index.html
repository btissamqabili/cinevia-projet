<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>cinevia</title>
    <link rel ="stylesheet" href="style.css">
</head>
<body>
   <header class="navbar">
    <div class="logo">
  <img src="images/logocinema.png" alt="logo">
  <span>Cinevia</span>
</div>
<nav class="menu">
  <a href="#home">Acceuil</a>
  <a href="#movies">Films</a>
  <a href="#favorites">Favoris</a>
</nav>
    <input type="text" placeholder="recherche...." class="search">
   </header> 
  <section id="home" class="hero">
    <div class="overlay"></div>
    <div class="hero-content">
  <h1>Découvrez les mellieures films</h1>
  <p>Explorez,recherchez et ajoutez vos films préférés</p>
  <button>Explorer maintenant</button>
    </div>
   </section>
   <section class="filters">
  <button class="filter-btn" data-cat="all">Tous</button>
<button class="filter-btn" data-cat="action">Action</button>
<button class="filter-btn" data-cat="drame">Drame</button>
<button class="filter-btn" data-cat="comédie">Comédie</button>
   </section>
    <section id="movies" class="movies">
    <h2>Films populaires</h2>
    <div class="grid" id="movie-container"></div>   
   </section>
<section id="favorites" class="Favorites">
 <h2>Mes Favoris ❤️</h2>
<div id="favorites-container"></div>
</section>

<footer>
  <p>© 2025 Cinevia - Tous droits réservés</p>
</footer>
<div id="popup" class="popup">
  <div class="popup-box">

    <span id="close">&times;</span>

    <div class="popup-left">
      <img id="popup-img" src="">
    </div>

    <div class="popup-right">
      <h2 id="popup-title"></h2>
      <span id="popup-category" class="category"></span>
      <p id="popup-desc"></p>

      <button id="fav-btn">❤️ Ajouter aux favoris</button>
    </div>

  </div>
</div>
<script src="index.js"></script>
</body>
</html>
