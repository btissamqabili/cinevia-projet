<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>cinevia</title>
    <link rel ="stylesheet" href="style.css">
</head>
<body>
   <header class="navbar">
    <div class="logo">
  <img src="images/logocinema.png" alt="logo">
  <span>Cinevia</span>
</div>
<nav class="menu">
  <a href="#home">Acceuil</a>
  <a href="#movies">Films</a>
  <a href="#favorites">Favoris</a>
</nav>
    <input type="text" placeholder="recherche...." class="search">
   </header> 
  <section id="home" class="hero">
    <div class="overlay"></div>
    <div class="hero-content">
  <h1>Découvrez les mellieures films</h1>
  <p>Explorez,recherchez et ajoutez vos films préférés</p>
  <button>Explorer maintenant</button>
    </div>
   </section>
    <section class="filters">
        <button>Tous</button>
        <button>action</button>
        <button>comédie</button>
        <button>Drame</button>
    </Section>
    <section id="movies" class="movies">
    <h2>Films populaires</h2>
    <div class="grid" id="movie-container"></div>   
   </section>
<section id="favorites" class="Favorites">
    <h2>Favoris</h2>
</section>

<footer>
  <p>© 2025 Cinevia - Tous droits réservés</p>
</footer>
<div id="modal" class="modal">
  <div class="modal-content">
    <span class="close">&times;</span>
    <img id="modal-img" src="" alt="">
    <h2 id="modal-title"></h2>
    <p id="modal-desc"></p>
    <button id="add-fav">Ajouter aux favoris</button>
  </div>
</div>
<script src="index.js"></script>
</body>
</html>
